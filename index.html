<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Velora AI</title>

    

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Remix Icon -->
     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    
</head>
<body class="bg-black">
<div class="wrapper  h-[100dvh] w-screen flex flex-col overflow-hidden">

    <!-- Mobile Sidebar -->
    <div class="sidebar hidden absolute top-0 left-0 bg-black h-screen w-[70%] flex justify-between px-4 py-5 border-r border-gray-600 z-20">
        <div class=" md:hidden top-cont flex justify-between border-b border-gray-500 h-12 w-full">
            <i class="ri-speak-fill text-[20px] text-white"></i>
            <h1 class="md:hidden flex text-white">Velora AI</h1>
            <i class="cross ri-close-large-line text-[20px] text-white"></i> 
        </div>
        
    </div>
    

    <!-- Main wrapper -->
    <div class="flex flex-col flex-1 min-h-0">

        <!-- Navbar -->
        <div class="navbar h-[9vh] w-full flex items-center justify-between px-4 md:px-6  shrink-0">
            <div class="left-nav flex items-center gap-4">
                <i class="menu ri-menu-2-line text-[22px] text-white md:hidden"></i>
                <h1 class="text-[20px] font-medium text-white">Velora AI</h1>
            </div>
            <div class="right-nav md:mt-[10px]">
                <button onclick="openLogin()" class="bg-black text-white border border-white px-6 py-2 text-[18px] rounded-full font-semibold cursor-pointer">Login</button>
            </div>
        </div>

        <!-- Message Area -->
        <div class="message bg-black flex-1 min-h-0 w-full p-4  md:px-6 overflow-y-auto">
            <!-- <div class="send-msg flex flex-col justify-end items-end text-white md:px-1">
                <div class="flex justify-end">
                    <h1 class="bg-[#212121] py-2 px-5 rounded-full w-fit">Send</h1>
                </div>
                <div class="icons flex justify-end gap-3 p-2">
                    <i class="ri-file-copy-line text-[14px]"></i>
                    <i class="ri-pencil-fill text-[14px]"></i>
                </div>
            </div> -->
            <!-- <div class="receive-msg flex flex-col justify-start text-white w-full">
                <div class="receive-cont">
                    <h1 class="text-[18px]">Recieve</h1>
                </div>
                <div class="icons flex justify-start gap-3 py-2">
                    <i class="ri-file-copy-line text-[14px]"></i>
                    <i class="ri-thumb-up-line text-[14px]"></i>
                    <i class="ri-thumb-down-line text-[14px]"></i>
                    <i class="ri-upload-2-fill text-[14px]"></i>
                    <i class="ri-loop-right-line text-[14px]"></i>
                    <i class="ri-more-line text-[14px]"></i>
                </div>
            </div> -->
            <div class="cont h-full flex items-center justify-center">
                <h1 class="text-white text-[24px] font-medium">What's on your mind?</h1>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="cont bg-black flex flex-col gap-3 text-white py-3 px-7 shrink-0 md:flex-row md:px-10 md:py-3 md:pl-[30px]">
            <button class="flex gap-4 text-[18px] cursor-pointer md:text-[13px] md:gap-2 md:border md:border-gray-700 md:px-4 md:py-2 md:rounded-full"><i class="ri-image-ai-line"></i>Create an image</button>
            <button class="flex gap-4 text-[18px] cursor-pointer md:text-[13px] md:gap-2 md:border md:border-gray-700 md:px-4 md:py-2 md:rounded-full"><i class="ri-pencil-ai-fill"></i>Write or edit</button>
            <button class="flex gap-4 text-[18px] cursor-pointer md:text-[13px] md:gap-2 md:border md:border-gray-700 md:px-4 md:py-2 md:rounded-full"><i class="ri-global-line"></i>Look something up</button>
        </div>

        <!-- Input -->
        <div class="input-container bg-black w-full flex items-center relative px-2 py-3 shrink-0">
            <i class="ri-add-large-fill absolute left-[30px] text-[22px] text-white z-10 cursor-pointer"></i>
            <input class="input bg-[#212121] w-full h-[60px] text-white text-[18px] rounded-full focus:outline-none pl-[60px] pr-[50px]" type="text" placeholder="Ask anything...">
            <i class="sendBtn ri-send-ins-fill text-white absolute right-[32px] text-[26px] z-10 cursor-pointer"></i>
        </div>

    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white w-[320px] rounded-2xl p-6 shadow-xl relative">
        <button onclick="closeLogin()" class="absolute top-3 right-3 text-gray-500 hover:text-black text-lg">✕</button>
        <h2 class="text-xl font-semibold text-center mb-6">Welcome Back</h2>
        <button onclick="googleLogin()" class="w-full flex items-center justify-center gap-3 border border-gray-300 py-2 rounded-lg hover:bg-gray-100 transition cursor-pointer">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
            <span class="text-sm font-medium">Continue with Google</span>
        </button>
        <p class="text-xs text-gray-400 text-center mt-4">Secure login powered by Firebase</p>
    </div>
</div>

<script type="module" src="gemini.js"></script>
</body>
</html>
